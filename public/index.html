<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RB5009 Traffic Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>RB5009 Traffic Monitor</h1>
          <p>RouterOS gateway live traffic and history</p>
        </div>
        <nav>
          <button id="tab-live" class="tab-btn active">Live</button>
          <button id="tab-history" class="tab-btn">History</button>
        </nav>
        <div class="status-indicator" id="status-indicator">
          <span class="led"></span>
          <span class="status-text">offline</span>
        </div>
      </header>
      <section class="dashboard-grid">
        <section class="panel metric-row">
          <span>WAN 即時</span>
          <strong id="wan-now">等待資料</strong>
        </section>
        <section class="panel metric-row">
          <span>LAN 即時</span>
          <strong id="lan-now">等待資料</strong>
        </section>

        <section class="panel chart-panel" id="panel-live">
          <h2>WAN 即時流量</h2><canvas id="live-chart" width="960" height="240"></canvas>
        </section>
        <section class="panel chart-panel" id="panel-live-lan">
          <h2>LAN 即時流量</h2><canvas id="live-chart-lan" width="960" height="240"></canvas>
        </section>
        <section class="panel chart-panel" id="panel-history" style="display:none">
          <h2>歷史流量</h2>
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
            <select id="history-iface" style="padding:4px 8px;background:#1a202c;color:#e2e8f0;border:1px solid #2d3748;border-radius:4px">
              <option value="bridge-WAN">bridge-WAN</option>
              <option value="bridge-LAN">bridge-LAN</option>
            </select>
            <select id="history-range" style="padding:4px 8px;background:#1a202c;color:#e2e8f0;border:1px solid #2d3748;border-radius:4px">
              <option value="1800">30 分鐘</option>
              <option value="7200">2 小時</option>
              <option value="21600">6 小時</option>
              <option value="86400" selected>24 小時</option>
              <option value="172800">2 天</option>
              <option value="432000">5 天</option>
              <option value="604800">7 天</option>
              <option value="2592000">1 個月</option>
            </select>
          </div>
          <div id="history-stats" style="display:flex;gap:24px;margin-bottom:8px;font-size:14px"></div>
          <canvas id="history-chart" width="960" height="240"></canvas>
        </section>
        <section class="panel">
          <h2>Top IP / MAC</h2>
          <table id="top-devices" class="device-table"></table>
        </section>
        <section class="panel">
          <h2>最近事件</h2>
          <ul id="events"></ul>
        </section>
      </section>
    </main>
    <script src="/shared.js"></script>
    <script src="/app.js"></script>
    <script src="/live-chart.js"></script>
    <script src="/history-chart.js"></script>
  </body>
</html>
